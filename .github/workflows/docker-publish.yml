name: Build and Publish Docker Image

on:
  push:
    branches: [ "master", "main" ]
    tags: [ 'v*.*.*' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha

      - name: Build Linux Binaries
        run: |
          mkdir -p dist
          # Makefileの定義に従い、Docker内でLinux用バイナリ(AMD64/ARM/ARM64)をビルド
          make linux

      - name: Prepare Docker Context
        run: |
          # DockerfileがTARGETARCH(amd64 or arm64)でバイナリを選択できるように名前を変更して配置
          cp dist/twpcap Docker/twpcap.amd64
          cp dist/twpcap.arm Docker/twpcap.arm
          cp dist/twpcap.arm64 Docker/twpcap.arm64

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm/v7,linux/arm64
