name: Build and Publish Docker Image

on:
  push:
    branches: [ "master", "main" ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0-test'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha

      - name: Build Linux Binaries
        run: |
          mkdir -p dist
          # Makefileの定義に従い、Docker内でLinux用バイナリ(AMD64/ARM/ARM64)をビルド
          make linux

      - name: Prepare Docker Context
        run: |
          # DockerfileがTARGETARCH(amd64 or arm64)でバイナリを選択できるように名前を変更して配置
          cp dist/twpcap Docker/twpcap.amd64
          cp dist/twpcap.arm Docker/twpcap.arm
          cp dist/twpcap.arm64 Docker/twpcap.arm64

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm/v7,linux/arm64

      - name: Build Windows Binary and Zip
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          make zip-win

      - name: Zip Linux Binaries
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          make zip-linux

      - name: Upload Windows & Linux Artifacts
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: twpcap-win-linux
          path: |
            dist/twpcap_win.zip
            dist/twpcap_linux_amd64.zip
            dist/twpcap_linux_arm.zip

  build-mac:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build macOS Binaries and Zip
        run: |
          make zip-mac

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twpcap-mac
          path: dist/twpcap_mac.zip

  create-release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-and-push, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Flatten directory structure
        run: |
          mkdir -p dist-release
          find dist-artifacts -name "*.zip" -exec cp {} dist-release/ \;
          ls -la dist-release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*.zip
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
